---
services:
  nginx:
    container_name: nginx
    image: nginx:latest
    restart: unless-stopped
    networks:
      - dashboard-bridge
    ports:
      - "80:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
  dashboard:
    container_name: dashboard
    build:
      context: .
    restart: unless-stopped
    env_file: .env

networks:
  dashboard-bridge:
